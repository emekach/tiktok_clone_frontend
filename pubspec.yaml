name: tiktok_clone
description: A TikTok-like short video sharing app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP client
  dio: ^5.4.0

  # Secure storage for JWT token
  flutter_secure_storage: ^9.0.0

  # Video player
  video_player: ^2.8.1
  chewie: ^1.7.4

  # Image picker (for video upload)
  image_picker: ^1.0.7

  # Cached images
  cached_network_image: ^3.3.1

  # Navigation
  go_router: ^13.0.0

  # UI helpers
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.7.0

  # File handling
  path_provider: ^2.1.2
  http_parser: ^4.0.2

  # Share
  share_plus: ^7.2.2

  # Bottom sheets / animations
  modal_bottom_sheet: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
